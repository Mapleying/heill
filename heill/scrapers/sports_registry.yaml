        title: "h2, h3, .camp-name, .listing-title"
        price: ".price, [class*='price']"
        dates: ".dates, .availability"
        location: ".location, .destination"
    - name: "WaveTribe"
      url: "https://wavetribe.com/collections/surf-camps"
      selectors:
        container: ".product-item, .camp-card, article, .grid-item"
        title: ".product-title, h2, h3, .title"
        price: ".product-price, .price, [class*='price']"
        dates: ".dates, [class*='date']"
        location: ".location, .destination"

