# Sport → aggregator URLs and CSS selectors for activity discovery
# Selectors are wrapped in try/except; failures fall through to text extraction.

tennis:
  search_terms:
    - "tennis camp"
    - "tennis holiday"
    - "tennis clinic"
    - "tennis academy holiday"
  aggregators:
    - name: "LoveTennis"
      url: "https://www.lovetennis.com/tennis-holidays/"
      selectors:
        container: ".holiday-card, .listing-item, article, .product"
        title: "h2, h3, .holiday-title, .product-title"
        price: ".price, [class*='price'], .cost"
        dates: ".dates, [class*='date'], .when"
        location: ".location, .destination"
    - name: "TennisEscapes"
      url: "https://tennisescapes.com/"
      selectors:
        container: ".tour, .camp, article, .product, .listing"
        title: "h2, h3, .tour-title, .camp-name"
        price: ".price, .from-price, [class*='price']"
        dates: ".departure, .date, [class*='date']"
        location: ".destination, .location"
    - name: "TennisCompete"
      url: "https://www.tenniscompete.com/tennis-camps/"
      selectors:
        container: ".camp-listing, .camp-card, article, .result"
        title: "h2, h3, .camp-name, .title"
        price: ".price, .camp-price, [class*='price']"
        dates: ".dates, .camp-dates, [class*='date']"
        location: ".location, .camp-location"

surf:
  search_terms:
    - "surf camp"
    - "surf retreat"
    - "surfing holiday"
    - "learn to surf holiday"
  aggregators:
